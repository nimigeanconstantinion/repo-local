global:
  security:
    allowInsecureImages: true

postgresql:
  auth:
    password: "password123"
    postgresPassword: "password123"

mysql:
  auth:
    rootPassword: "root"
    password: "kJ4PkjxJed"
  service:
    type: NodePort
    nodePorts:
      mysql: 30006

kafka:
  externalAccess:
    enabled: true
    autoDiscovery:
      enabled: false
    broker:
      service:
        type: NodePort
        domain: localhost
        ports:
          external: 9094
        nodePorts:
          - 30001
          - 30002
          - 30003

kafka-ui:
  ingress:
    enabled: true
    ingressClassName: "nginx"
    host: "localhost"
    path: "/kafka"
    pathType: "Prefix"

elasticsearch:
  security:
    elasticPassword: "paassw0rd"

logstash:
  extraEnvVars:
    - name: ELASTICSEARCH_HOST
      value: "resurse-app-elasticsearch"
    - name: ELASTICSEARCH_PORT
      value: "9200"
    - name: ES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: resurse-app-elasticsearch
          key: elasticsearch-password
  service:
    type: NodePort
    ports:
      - name: logstash-tcp
        port: 5044
        targetPort: 5044
        protocol: TCP
        nodePort: 30544

kibana:
  elasticsearch:
    hosts:
      - "resurse-app-elasticsearch"
    security:
      auth:
        kibanaPassword: "paassw0rd"
        elasticsearchPasswordSecret: "resurse-app-elasticsearch"
  ingress:
    enabled: true
    ingressClassName: "nginx"
    hostname: "localhost"
    path: "/kibana"
    pathType: "Prefix"
    annotations:
      nginx.ingress.kubernetes.io/x-forwarded-prefix: "/kibana"

keycloak:
  httpRelativePath: "/keycloak"
  auth:
    adminPassword: "StrongPassword123!"
  externalDatabase:
    password: "password123"
  ingress:
    enabled: true
    ingressClassName: "nginx"
    hostname: "localhost"
    path: "/keycloak"
    pathType: "Prefix"
    annotations:
      nginx.ingress.kubernetes.io/x-forwarded-prefix: "/keycloak"

prometheus:
  server:
    ingress:
      enabled: true
      ingressClassName: "nginx"
      hosts:
        - "localhost"
      path: "/prometheus"
      pathType: "Prefix"
    prefixURL: /prometheus
    extraArgs:
      web.external-url: "http://localhost/prometheus"

grafana:
  adminPassword: "admin"
  env:
    GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana"
    GF_SERVER_SERVE_FROM_SUB_PATH: "true"
  ingress:
    enabled: true
    ingressClassName: "nginx"
    hosts:
      - "localhost"
    path: "/grafana"
    pathType: "Prefix"
  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s/grafana"
      serve_from_sub_path: true

kong:
  enabled: true
  postgresql:
    enabled: true
  kong:
    extraEnvVars:
      - name: KONG_PROXY_LISTEN
        value: "0.0.0.0:5000"
      - name: KONG_ADMIN_LISTEN
        value: "0.0.0.0:8001"
