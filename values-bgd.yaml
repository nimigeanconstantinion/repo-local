global:
  security:
    allowInsecureImages: true

postgresql:
  auth:
    password: "password123"
    postgresPassword: "password123"

mysql:
  auth:
    rootPassword: "root"
    password: "kJ4PkjxJed"
  service:
    type: NodePort
    nodePorts:
      mysql: 30006

kafka:
  externalAccess:
    enabled: true
    autoDiscovery:
      enabled: false
    broker:
      service:
        type: NodePort
        domain: localhost
        ports:
          external: 9094
        nodePorts:
          - 30001
          - 30002
          - 30003

kafka-ui:
  ingress:
    enabled: true
    ingressClassName: "nginx"
    host: "localhost"
    path: "/kafka"
    pathType: "Prefix"

elasticsearch:
  security:
    elasticPassword: "paassw0rd"

logstash:
  extraEnvVars:
    - name: ELASTICSEARCH_HOST
      value: "elasticsearch"
    - name: ELASTICSEARCH_PORT
      value: "9200"
    - name: ES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: elasticsearch
          key: elasticsearch-password
  service:
    type: NodePort
    ports:
      - name: logstash-tcp
        port: 5044
        targetPort: 5044
        protocol: TCP
        nodePort: 30544

kibana:
  elasticsearch:
    hosts:
      - "elasticsearch"
    security:
      auth:
        kibanaPassword: "paassw0rd"
        elasticsearchPasswordSecret: "elasticsearch"
  ingress:
    enabled: true
    ingressClassName: "nginx"
    hostname: "localhost"
    path: "/kibana"
    pathType: "Prefix"
    annotations:
      nginx.ingress.kubernetes.io/x-forwarded-prefix: "/kibana"

keycloak:
  httpRelativePath: "/keycloak"
  auth:
    adminPassword: "StrongPassword123!"
  externalDatabase:
    password: "password123"
  ingress:
    enabled: true
    ingressClassName: "nginx"
    hostname: "localhost"
    path: "/keycloak"
    pathType: "Prefix"
    annotations:
      nginx.ingress.kubernetes.io/x-forwarded-prefix: "/keycloak"

prometheus:
  server:
    ingress:
      enabled: true
      ingressClassName: "nginx"
      hosts:
        - "localhost"
      path: "/prometheus"
      pathType: "Prefix"
    prefixURL: /prometheus
    extraArgs:
      web.external-url: "http://localhost/prometheus"

grafana:
  adminPassword: "admin"
  env:
    GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana"
    GF_SERVER_SERVE_FROM_SUB_PATH: "true"
  ingress:
    enabled: true
    ingressClassName: "nginx"
    hosts:
      - "localhost"
    path: "/grafana"
    pathType: "Prefix"
  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s/grafana"
      serve_from_sub_path: true

kong:
  enabled: true
  replicaCount: 1
  image:
    registry: docker.io
    repository: bitnamilegacy/kong
    tag: 3.9.1-debian-12-r10
    digest: ""
    pullPolicy: IfNotPresent
  ingressController:
    image:
      registry: docker.io
      repository: bitnamilegacy/kong-ingress-controller
      tag: 3.5.1-debian-12-r3
      digest: ""
      pullPolicy: IfNotPresent
  database: "off"
  postgresql:
    enabled: false
  kong:
    containerPorts:
      proxyHttp: 5000
      adminHttp: 8001
    extraEnvVars:
      - name: KONG_PROXY_LISTEN
        value: "0.0.0.0:5000"
      - name: KONG_ADMIN_LISTEN
        value: "0.0.0.0:8001"
      - name: KONG_ADMIN_GUI_LISTEN
        value: "0.0.0.0:8002"
      - name: KONG_ADMIN_GUI_URL
        value: "http://localhost/kong-manager"
      - name: KONG_ADMIN_GUI_API_URL
        value: "http://localhost/kong-admin"
  service:
    type: ClusterIP
    exposeAdmin: true
    extraPorts:
      - name: admin-gui
        port: 8002
        targetPort: 8002
        protocol: TCP
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: localhost
    path: /kong(/|$)(.*)
    pathType: ImplementationSpecific
    annotations:
      kubernetes.io/ingress.class: nginx
      nginx.ingress.kubernetes.io/use-regex: "true"
      nginx.ingress.kubernetes.io/rewrite-target: /$2
    extraRules:
      - host: localhost
        http:
          paths:
            - path: /kong-admin(/|$)(.*)
              pathType: ImplementationSpecific
              backend:
                service:
                  name: "{{ include \"common.names.fullname\" $ }}"
                  port:
                    name: http-admin
            - path: /kong-manager(/|$)(.*)
              pathType: ImplementationSpecific
              backend:
                service:
                  name: "{{ include \"common.names.fullname\" $ }}"
                  port:
                    name: admin-gui

konga:
  enabled: true
  replicaCount: 1
  image:
    repository: pantsel/konga
    tag: "0.14.9"
    pullPolicy: IfNotPresent
  config:
    node_env: development
    token_secret: "konga-secret-bgd"
    konga_node_data: "/etc/konga-seed/kong_node.data"
    konga_user_data: "/etc/konga-seed/userdb.data"
  extraVolumes:
    - name: konga-seed
      configMap:
        name: konga-kong-node-seed
  extraVolumeMounts:
    - name: konga-seed
      mountPath: /etc/konga-seed
      readOnly: true
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: false
