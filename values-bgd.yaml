global:
  security:
    allowInsecureImages: true

postgresql:
  auth:
    password: "password123"
    postgresPassword: "password123"

mysql:
  auth:
    rootPassword: "root"
    password: "kJ4PkjxJed"
  service:
    type: NodePort
    nodePorts:
      mysql: 30006

kafka:
  externalAccess:
    enabled: true
    autoDiscovery:
      enabled: false
    broker:
      service:
        type: NodePort
        domain: localhost
        ports:
          external: 9094
        nodePorts:
          - 30001
          - 30002
          - 30003

kafka-ui:
  ingress:
    enabled: true
    ingressClassName: "nginx"
    host: "localhost"
    path: "/kafka"
    pathType: "Prefix"

elasticsearch:
  security:
    elasticPassword: "paassw0rd"

logstash:
  extraEnvVars:
    - name: ELASTICSEARCH_HOST
      value: "elasticsearch"
    - name: ELASTICSEARCH_PORT
      value: "9200"
    - name: ES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: elasticsearch
          key: elasticsearch-password
  service:
    type: NodePort
    ports:
      - name: logstash-tcp
        port: 5044
        targetPort: 5044
        protocol: TCP
        nodePort: 30544

kibana:
  elasticsearch:
    hosts:
      - "elasticsearch"
    security:
      auth:
        kibanaPassword: "paassw0rd"
        elasticsearchPasswordSecret: "elasticsearch"
  ingress:
    enabled: true
    ingressClassName: "nginx"
    hostname: "localhost"
    path: "/kibana"
    pathType: "Prefix"
    annotations:
      nginx.ingress.kubernetes.io/x-forwarded-prefix: "/kibana"

keycloak:
  httpRelativePath: "/keycloak"
  auth:
    adminPassword: "StrongPassword123!"
  externalDatabase:
    password: "password123"
  ingress:
    enabled: true
    ingressClassName: "nginx"
    hostname: "localhost"
    path: "/keycloak"
    pathType: "Prefix"
    annotations:
      nginx.ingress.kubernetes.io/x-forwarded-prefix: "/keycloak"

prometheus:
  server:
    ingress:
      enabled: true
      ingressClassName: "nginx"
      hosts:
        - "localhost"
      path: "/prometheus"
      pathType: "Prefix"
    prefixURL: /prometheus
    extraArgs:
      web.external-url: "http://localhost/prometheus"

grafana:
  adminPassword: "admin"
  env:
    GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana"
    GF_SERVER_SERVE_FROM_SUB_PATH: "true"
  ingress:
    enabled: true
    ingressClassName: "nginx"
    hosts:
      - "localhost"
    path: "/grafana"
    pathType: "Prefix"
  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s/grafana"
      serve_from_sub_path: true

kongDeclarativeConfig:
  enabled: true
  name: kong-bgd-declarative-config
  file: files/kong/bgd-kong.yml

kong:
  enabled: true
  replicaCount: 1
  image:
    registry: docker.io
    repository: bitnamilegacy/kong
    tag: 3.9.1-debian-12-r10
    digest: ""
    pullPolicy: IfNotPresent
  ingressController:
    enabled: false
    image:
      registry: docker.io
      repository: bitnamilegacy/kong-ingress-controller
      tag: 3.5.1-debian-12-r3
      digest: ""
      pullPolicy: IfNotPresent
  database: "off"
  postgresql:
    enabled: false
  kong:
    declarativeConfigCM: "kong-bgd-declarative-config"
    containerPorts:
      proxyHttp: 5000
      adminHttp: 8001
    customReadinessProbe:
      tcpSocket:
        port: http-proxy
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 6
      successThreshold: 1
    extraEnvVars:
      - name: KONG_PROXY_LISTEN
        value: "0.0.0.0:5000"
      - name: KONG_ADMIN_LISTEN
        value: "0.0.0.0:8001"
      - name: KONG_ROUTER_FLAVOR
        value: "traditional"
  service:
    type: ClusterIP
    exposeAdmin: false
    extraPorts: []
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: localhost
    path: /kong(/|$)(.*)
    pathType: ImplementationSpecific
    annotations:
      kubernetes.io/ingress.class: nginx
      nginx.ingress.kubernetes.io/use-regex: "true"
      nginx.ingress.kubernetes.io/rewrite-target: /$2
    extraRules: []
