mysql:
  auth:
    rootPassword: "root"
  initdbScripts:
      01-setup.sql: |
        CREATE DATABASE IF NOT EXISTS my_test_db;
  
  service:
    type: NodePort
    nodePorts:
      mysql: 30006


logstash:
  extraEnvVars:
    - name: ELASTICSEARCH_HOST
      value: "my-app-elasticsearch"
    - name: ELASTICSEARCH_PORT
      value: "9200"
    - name: ES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: my-app-elasticsearch
          key: elasticsearch-password
  service:
    type: NodePort
    ports:
      - name: logstash-tcp
        port: 5044
        targetPort: 5044
        protocol: TCP
        nodePort: 30544

elasticsearch:
  security:
    elasticPassword: "paassw0rd"
  sysctlImage:
    registry: docker.io
    repository: bitnamilegacy/elasticsearch
    tag: 9.1.2-debian-12-r0
    digest: ""
    pullPolicy: IfNotPresent

  # Dacă eroarea persistă la permisiunile volumelor:
  volumePermissions:
    enabled: true
    image:
      registry: docker.io
      repository: bitnamilegacy/elasticsearch
      tag: 9.1.2-debian-12-r0
      digest: ""
      pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 200m
      memory: 2Gi   # Ridicăm și request-ul pentru a rezerva spațiul pe nod
    limits:
      cpu: 1000m    # Un CPU întreg ajută la pornire și indexare
      memory: 3Gi   # Limita de 3GB oferă destul loc pentru Heap (1GB) + Overhead


kibana:
  elasticsearch:
    hosts:
      - "my-app-elasticsearch"
    port: 9200

    security:
      auth:
        kibanaPassword: "paassw0rd"
        elasticsearchPasswordSecret: "my-app-elasticsearch"
  ingress:
    enabled: true
    ingressClassName: "nginx"
    hostname: "localhost"
    path: "/kibana"
    pathType: "Prefix"
    annotations:
      # Aceasta forțează Nginx să paseze prefixul corect către aplicație
      nginx.ingress.kubernetes.io/x-forwarded-prefix: "/kibana"      

kafka:
  externalAccess:
    enabled: true
    autoDiscovery:
      enabled: false
    broker:
      service:
        type: NodePort
        domain: localhost
        ports:
          external: 9094
        nodePorts:
          - 30001
          - 30002
          - 30003

kafka-ui:
  ingress:
    enabled: true
    ingressClassName: "nginx"
    host: "localhost"
    path: "/kafka"
    pathType: "Prefix"

prometheus:
  image:
    registry: docker.io
    repository: bitnamilegacy/prometheus
    tag:  3.5.0-debian-12-r3
    digest: ""
    pullPolicy: IfNotPresent
